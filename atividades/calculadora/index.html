<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
</head>
<body>
    <main>
        <div class="calculadora">
            <div class="display">0</div>

            <div class="buttons">
                <button class="limpar">
                    c
                </button>
              
                <button class="operador">
                    /
                </button>
                <button class="operador">
                    *
                </button>

                <button class="numero">
                    7
                </button>
                <button class="numero">
                    8
                </button>
                <button class="numero">
                    9
                </button>

                <button class="numero">
                    4
                </button>
                <button class="numero">
                    5
                </button>
                <button class="numero">
                    6
                </button>

                <button class="numero">
                    3
                </button>
                <button class="numero">
                    2
                </button>
                <button class="numero">
                    1
                </button>

                <button class="operador">
                    =
                </button>
            </div>

        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
